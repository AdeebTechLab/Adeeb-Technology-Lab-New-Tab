<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adeeb Tech Lab</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
  :root{
--primary:#0f172a;
--accent:#3b82f6;
--bg-gradient:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
--glass:rgba(255,255,255,0.08);
--radius:18px;
--shadow:0 20px 40px rgba(0,0,0,0.25);
--blur:blur(16px);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:var(--bg-gradient);
min-height:100vh;
display:flex;
flex-direction:column;
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 5%;
backdrop-filter:var(--blur);
background:var(--glass);
box-shadow:0 8px 30px rgba(0,0,0,0.2);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
font-weight:600;
font-size:18px;
letter-spacing:0.5px;
}

.header-btn{
padding:8px 18px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#3b82f6,#2563eb);
color:white;
cursor:pointer;
transition:all .3s ease;
}

.header-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(59,130,246,0.4);
}

/* MAIN */
.main-layout{
flex:1;
display:flex;
gap:40px;
padding:40px 6%;
}

/* LEFT SIDE */
.lms-section{
min-width:280px;
flex:1;
display:flex;
flex-direction:column;
gap:20px;
}

.lms-card{
background:var(--glass);
backdrop-filter:var(--blur);
border-radius:var(--radius);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:var(--shadow);
transition:.3s ease;
border:1px solid rgba(255,255,255,0.1);
}

.lms-card:hover{
transform:translateY(-6px);
}

.lms-icon{
width:45px;
}

.lms-info h4{
font-size:15px;
margin-bottom:4px;
}

.lms-info p{
font-size:12px;
opacity:0.7;
}

.lms-login-btn{
padding:7px 14px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
cursor:pointer;
transition:.3s;
}

.lms-login-btn:hover{
background:#2563eb;
}

/* RIGHT CONTENT */
.content-section{
flex:2;
display:flex;
flex-direction:column;
align-items:center;
gap:25px;
}

.timer-box{
display:flex;
gap:15px;
}

.time{
background:var(--glass);
backdrop-filter:var(--blur);
padding:20px;
border-radius:16px;
font-size:28px;
min-width:70px;
text-align:center;
box-shadow:var(--shadow);
border:1px solid rgba(255,255,255,0.1);
}

.date-box{
background:var(--glass);
padding:8px 16px;
border-radius:14px;
box-shadow:var(--shadow);
font-size:14px;
border:1px solid rgba(255,255,255,0.1);
}

.location-area{
display:flex;
gap:12px;
flex-wrap:wrap;
}

.loc-box{
background:linear-gradient(135deg,#3b82f6,#1e3a8a);
color:white;
padding:8px 14px;
border-radius:12px;
font-size:13px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.search-container{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.search-container input{
width:300px;
max-width:90%;
height:42px;
padding-left:15px;
border-radius:25px;
border:none;
outline:none;
background:rgba(255,255,255,0.15);
color:white;
backdrop-filter:var(--blur);
}

#searchBtn,#voiceBtn{
width:42px;
height:42px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
cursor:pointer;
transition:.3s;
}

#searchBtn:hover,#voiceBtn:hover{
transform:translateY(-3px);
}

.more-app{
font-weight:600;
font-size:18px;
margin-top:10px;
}

.app-box{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.app{
background:var(--glass);
padding:12px 20px;
border-radius:14px;
box-shadow:var(--shadow);
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,0.1);
}

.app:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.15);
}

/* FOOTER */
footer{
padding:15px;
backdrop-filter:var(--blur);
background:var(--glass);
border-top:1px solid rgba(255,255,255,0.1);
}

.footer-buttons{
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

.footer-btn{
padding:8px 18px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#3b82f6,#1d4ed8);
color:white;
cursor:pointer;
transition:.3s;
}

.footer-btn:hover{
transform:translateY(-3px);
}

/* RESPONSIVE */
@media(max-width:1000px){
.main-layout{
flex-direction:column;
padding:30px 5%;
}
.lms-section{
width:100%;
}
.content-section{
width:100%;
}
.timer-box{
justify-content:center;
}
}

@media(max-width:500px){
.logo-area{
font-size:15px;
}
.time{
font-size:22px;
padding:15px;
}
.search-container input{
width:100%;
}
}

</style>
</head>
